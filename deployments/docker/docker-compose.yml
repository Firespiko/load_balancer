services:
    backend1:
        build:
            context: ../..
            dockerfile: deployments/docker/Dockerfile.backend
        container_name: backend1
        command: [ "./backend", "-port", "8001", "-name", "backend1" ]
        networks:
            - lb-network

    backend2:
        build:
            context: ../..
            dockerfile: deployments/docker/Dockerfile.backend
        container_name: backend2
        command: [ "./backend", "-port", "8002", "-name", "backend2" ]
        networks:
            - lb-network

    loadbalancer:
        build:
            context: ../..
            dockerfile: deployments/docker/Dockerfile
        container_name: loadbalancer
        ports:
            - "3030:3030"
        networks:
            - lb-network
        depends_on:
            - backend1
            - backend2
    prometheus:
        image: prom/prometheus:latest
        container_name: prometheus

        ports:
            - "9090:9090"

        volumes:
            - ../../internal/metrics/prometheus.yml:/etc/prometheus/prometheus.yml:ro

        networks:
            - lb-network

        depends_on:
            - loadbalancer

    grafana:
        image: grafana/grafana:latest
        container_name: grafana
        ports:
            - "3000:3000"
        volumes:
            - grafana-data:/var/lib/grafana
        networks:
            - lb-network
        depends_on:
            - prometheus

networks:
    lb-network:
        driver: bridge

volumes:
    grafana-data:
